---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-samplecontroller-samplecontroller-example-com-v1alpha1-foo
  failurePolicy: Fail
  name: mfoo-v1alpha1.kb.io
  rules:
  - apiGroups:
    - samplecontroller.samplecontroller.example.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - foos
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-samplecontroller-samplecontroller-example-com-v1alpha1-foo
  failurePolicy: Fail
  name: vfoo-v1alpha1.kb.io
  rules:
  - apiGroups:
    - samplecontroller.samplecontroller.example.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - foos
  sideEffects: None
