# This rule is not used by the project operator-sdk itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over samplecontroller.samplecontroller.example.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: operator-sdk
    app.kubernetes.io/managed-by: kustomize
  name: foo-admin-role
rules:
- apiGroups:
  - samplecontroller.samplecontroller.example.com
  resources:
  - foos
  verbs:
  - '*'
- apiGroups:
  - samplecontroller.samplecontroller.example.com
  resources:
  - foos/status
  verbs:
  - get
